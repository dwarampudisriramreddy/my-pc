# Termux Linux Desktop - Preferences
# Inspired by termux-x11 preference management pattern

# Display configuration
DISPLAY=":0"

# Ubuntu version
UBUNTU_VERSION="24.04"

# Desktop user
DESKTOP_USER="termux"
DESKTOP_PASS="termux"

# PulseAudio server
PULSE_SERVER="unix:/run/user/1000/pulse/native"

# Extra bind mounts (colon-separated)
EXTRA_BINDINGS=""

# Auto-start desktop on app launch
AUTO_START=false

# XFCE session type (xfce4, xubuntu, etc.)
SESSION_TYPE="xfce4"
